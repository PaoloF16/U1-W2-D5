<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./Amazon Page/assets/css/reset.css" />
    <link rel="stylesheet" href="./Amazon Page/assets/css/normalize.css">
    <link rel="stylesheet" href="./Amazon Page/assets/css/mockupstyle.css" />
    <title>AmazonMockup</title>
  </head>

  <body>
    <header>
      <div id="imageAmazon">
        <img src="./Amazon Page/assets/images/logo.png">
      </div>
      <div class="navBarTop">
        <nav>
          <ul>
            <li>All</li>
            <li>Today's Deals</li>
            <li>Customer Service</li>
            <li>Registry</li>
            <li>Gift Cards</li>
            <li>Sell</li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <div class="topbar">
        <div class="boxOrange">
          <h3>Shop All Holiday Gift Cards</h3>
        </div>
        <div id="upbox">
          <img src="./Amazon Page/assets/images/bg-image.png">
        </div>
      </div>

      <div id="shopNowBox">
        <h2>Find the perfect gift</h2>
        <h4>Shop now</h4>
        <div class="boxItem">
          <div><img src="./Amazon Page/assets/images/img_1.jpg"></div>
          <div><img src="./Amazon Page/assets/images/img_2.jpg"></div>
          <div><img src="./Amazon Page/assets/images/img_3.jpg"></div>
          <div><img src="./Amazon Page/assets/images/img_4.jpg"></div>
        </div>
      </div>

      <div id="middleBox">
        <img src="./Amazon Page/assets/images/img_9.png">
        <h2>Play the gifting game</h2>
        <h4>Shop gaming</h4>
      </div>
    
      <div id="bottomImgBox">
        <img src="./Amazon Page/assets/images/img_10.png">
        <h2>The sound of cheer</h2>
        <h4>Shop Audio & Accessories</h4>
      </div>
    </main>

    <footer>
      <div class="backTop">
        <p>Back to top</p>
      </div>
      <div class="footerLogo">
        <img src="./Amazon Page/assets/images/logo.png">
      </div>
    </footer>
  </body>
</html>
